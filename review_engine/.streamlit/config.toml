# Streamlit config for the internal-only, auth-gated deploy (RAYAAAA-194).
# Env vars in the Dockerfile take precedence; this file documents intent and
# covers a bare `streamlit run` outside the container.
[server]
headless = true
address = "0.0.0.0"          # container-internal only; never published to host
port = 8501
baseUrlPath = "admin/review-engine"
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false     # no telemetry egress

# RAYAAAA-260: reskin the Review Engine to match the LIVE marketing site
# (rayserrsolutions.com) and add a teal accent per the owner (RAYAAAA-191).
# Palette lifted verbatim from the site's marketing.css design tokens:
#   --navy #1b2f5b   --navy-light #2a4580   --bg #f7f8fc   --bg-alt #ffffff
#   --gold #c8922a   --text #1a1f2e         --border #e4e9f0
# The owner asked to "add teal" as the interactive accent; navy + teal + gold is
# the resulting professional trio. Teal token (buttons / links / active states):
#   --teal #2a9d8f   --teal-hover #238577   --teal-on-navy #4ac0b0
# Headings use a serif face to mirror the site's Georgia serif headings (the
# exact Georgia stack is pinned in main.py CSS). This file is copied to
# /app/.streamlit in the Dockerfile so Streamlit (CWD=/app) reads it; env vars
# only cover the [server] keys above.
[theme]
base = "light"
primaryColor = "#2a9d8f"             # teal — buttons, active tab, active widgets
backgroundColor = "#f7f8fc"          # marketing.css --bg (content area)
secondaryBackgroundColor = "#ffffff" # marketing.css --bg-alt (cards / widgets)
textColor = "#1a1f2e"                # marketing.css --text
linkColor = "#2a9d8f"                # teal links (the requested accent)
borderColor = "#e4e9f0"              # marketing.css --border (widget outlines)
font = "sans serif"                  # body: system sans, mirrors the site body
headingFont = "serif"                # headings: serif, mirrors Georgia headings

[theme.sidebar]
backgroundColor = "#1b2f5b"          # navy sidebar, mirrors the site header/nav
secondaryBackgroundColor = "#2a4580" # marketing.css --navy-light (sidebar widgets)
textColor = "#ffffff"
primaryColor = "#2a9d8f"             # teal active-nav indicator (requested accent)
linkColor = "#4ac0b0"                # lighter teal for legible links on navy

[client]
# Hide Streamlit's dev/hamburger toolbar so the RAYSERR brand isn't sharing the
# chrome with Streamlit's own (RAYAAAA-227). "minimal" keeps only essentials.
toolbarMode = "minimal"

[global]
# Findings are risk INDICATORS to guide human review — not legal/fraud
# determinations (RAYAAAA-192 AC4). Framing preserved in-app and portal-side.
showWarningOnDirectExecution = false
